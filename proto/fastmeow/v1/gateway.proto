// FastMeow Gateway API — Phase 1 + 4.1 + 4.2 + 4.3 (stubs) 合约。
//
// 稳定性：此文件是 Python SDK 与 Go sidecar 之间的公共边界。
// 一旦标记为 v1.0，允许添加（新 RPC、新事件变体、新可选字段），
// 但现有字段是不可变的。删除操作需要新的包版本 (fastmeow.v2)。
//
// Phase 1 范围：
//   - 单个 sidecar 进程托管 N 个 whatsmeow.Client 实例。
//   - QR 配对 + 文本消息发送/接收。
//   - 服务端流式事件（无双向流，默认无软事件）。
//
// Phase 4.1 范围（wire 兼容）：
//   - 群组只读元数据：list / get / preview-invite。
//   - 群组写操作：create / leave / join-via-invite / update-settings /
//     update-participants / invite-link 取回。
//   - 三类群组事件：JoinedGroupEvent / GroupInfoEvent /
//     GroupParticipantUpdateEvent（占用 oneof tag 16/17/18）。
//
// Phase 4.2 范围（wire 兼容）：
//   - 回执 / 在线状态：MarkRead / SendPresence / SendChatPresence /
//     SubscribePresence + 三类入站事件（19/20/21）。
//
// Phase 4.3 范围（仅 wire stubs，本提交，向后兼容；Go/Python 实装后续提交）：
//   - 媒体上传：客户端流式 SendMedia（Init 帧 + chunk 帧）。
//   - 媒体下载：服务端流式 DownloadMedia。
//   - 入站媒体事件：MediaMessageEvent（占 oneof tag 22）。
//   - 共享媒体载体：MediaInfo + MediaKind。
//   - 注意：本提交故意不 bump 协议握手版本（仍为 1），让旧 Python 客户端
//     与新 sidecar 兼容；Phase 4.3 实装提交时再统一 bump。
//
// 不在当前范围内（保留字段编号以备后用）：
//   - 回应 (Reactions)、编辑、撤回。
//   - 分片 sidecar 协同（仅单个 sidecar_id="default"）。

syntax = "proto3";

package fastmeow.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/jianjian2048/fastmeow/gen/go/fastmeow/v1;fastmeowv1";

// ─────────────────────────────────────────────────────────────────────────────
// Service (服务)
// ─────────────────────────────────────────────────────────────────────────────
//
// 惯例：即使包体目前为空或微不足道，每个 RPC 也有专用的 *Response 消息。
// 这让我们以后可以在不破坏 wire 协议的情况下添加响应字段。

service GatewayService {
  // 健康检查与版本握手。由 supervisor 在启动后立即调用，
  // 以验证 sidecar 是否存活且协议兼容。
  rpc Ping(PingRequest) returns (PingResponse);

  // 幂等地向 sidecar 注册 账号 / account_key。如果 key 是新的，
  // 则创建一个新的 whatsmeow 设备（未配对）。如果已存在，
  // 则返回现有设备。必须在 Connect 之前调用。
  rpc EnsureAccount(EnsureAccountRequest) returns (EnsureAccountResponse);

  // 驱动 whatsmeow.Client 生命周期：打开 WebSocket，如果是
  // 未配对状态则驱动 QR 循环，在 PairSuccess 时转换到 CONNECTED 状态。幂等。
  rpc Connect(ConnectRequest) returns (ConnectResponse);

  // 关闭 WebSocket 但保留设备凭据。
  rpc Disconnect(DisconnectRequest) returns (DisconnectResponse);

  // 清除设备凭据。此后账号必须通过 QR 重新配对。
  rpc Logout(LogoutRequest) returns (LogoutResponse);

  // 发送消息。client_msg_id 字段提供幂等性；如果具有相同
  // (account_key, client_msg_id) 的请求在去重窗口内已被确认，
  // 则返回缓存的响应而不重新发送。
  rpc SendMessage(SendMessageRequest) returns (SendMessageResponse);

  // 单个长连接服务端流，承载此 sidecar 上所有账号的所有事件。
  // Python 为每个 sidecar 打开一个 StreamEvents 调用。
  // 来自不同账号的事件被多路复用；消费者通过 account_key 进行路由。
  //
  // 顺序：给定 (account_key, chat_jid) 对的事件按单调递增的 seq 顺序发出。
  // 不保证跨聊天顺序。
  rpc StreamEvents(StreamEventsRequest) returns (stream StreamEventsResponse);

  // ───────────────────────────────────────────────────────────────────────────
  // Group RPCs (Phase 4.1)
  // ───────────────────────────────────────────────────────────────────────────
  //
  // 设计要点：
  //   - 所有读 RPC 直接命中 whatsmeow 的本地缓存或服务端拉取，sidecar 不缓存。
  //   - 所有写 RPC 由用户主动触发，不做幂等键去重（与 SendMessage 不同）；
  //     重复调用会向 WhatsApp 重复发送，由调用方负责。
  //   - 错误映射：JID 非法 → INVALID_ARGUMENT；账号未连接 → FAILED_PRECONDITION；
  //     whatsmeow 业务错误（403/不在群里/被踢等）→ PERMISSION_DENIED 或 NOT_FOUND；
  //     其他网络/服务端错误 → UNAVAILABLE 并附带原始错误文本。

  // 列出该账号当前加入的所有群（whatsmeow GetJoinedGroups）。
  rpc ListJoinedGroups(ListJoinedGroupsRequest) returns (ListJoinedGroupsResponse);

  // 获取单个群的完整元数据（whatsmeow GetGroupInfo）。
  // 如果账号不在该群，返回 NOT_FOUND。
  rpc GetGroupInfo(GetGroupInfoRequest) returns (GetGroupInfoResponse);

  // 通过邀请链接预览群信息但不加入（whatsmeow GetGroupInfoFromLink）。
  // 邀请链接形如 "https://chat.whatsapp.com/<code>"，code 部分会被自动剥取。
  rpc PreviewGroupInvite(PreviewGroupInviteRequest) returns (PreviewGroupInviteResponse);

  // 通过邀请链接加入群（whatsmeow JoinGroupWithLink）。
  // 加入后 whatsmeow 会发出 GroupInfo 事件，由 bus 转发为 JoinedGroupEvent。
  rpc JoinGroupViaInvite(JoinGroupViaInviteRequest) returns (JoinGroupViaInviteResponse);

  // 离开群（whatsmeow LeaveGroup）。如果账号不在群里，返回 NOT_FOUND。
  rpc LeaveGroup(LeaveGroupRequest) returns (LeaveGroupResponse);

  // 创建新群（whatsmeow CreateGroup）。
  // 至少需要一个除创建者外的初始参与者；whatsmeow 不允许创建只有自己的群。
  rpc CreateGroup(CreateGroupRequest) returns (CreateGroupResponse);

  // 修改群设置（名称/主题/announce/locked）。
  // 仅允许修改请求中显式设置的字段，缺省字段保持不变。
  // 各字段对应 whatsmeow 的 SetGroupName / SetGroupTopic /
  // SetGroupAnnounce / SetGroupLocked。需要管理员权限。
  rpc UpdateGroupSettings(UpdateGroupSettingsRequest) returns (UpdateGroupSettingsResponse);

  // 添加 / 移除 / 提升 / 降级群成员（whatsmeow UpdateGroupParticipants）。
  // 单次调用所有目标 JID 共享同一动作；混合动作请发起多次调用。
  // 需要管理员权限。
  rpc UpdateGroupParticipants(UpdateGroupParticipantsRequest) returns (UpdateGroupParticipantsResponse);

  // 取回当前群的邀请链接（whatsmeow GetGroupInviteLink）。
  // reset=true 时会失效旧链接并生成新链接。需要管理员权限。
  rpc GetGroupInviteLink(GetGroupInviteLinkRequest) returns (GetGroupInviteLinkResponse);

  // ───────────────────────────────────────────────────────────────────────────
  // Receipts & Presence (Phase 4.2)
  // ───────────────────────────────────────────────────────────────────────────

  // 将一组消息标记为已读 / 已播放。对应 whatsmeow Client.MarkRead。
  // sender_jid 在 DM 中等于 chat_jid，在群聊中是真正发送者的 JID。
  rpc MarkRead(MarkReadRequest) returns (MarkReadResponse);

  // 推送账号自身的全局在线状态（available / unavailable）。
  // 对应 whatsmeow Client.SendPresence。
  rpc SendPresence(SendPresenceRequest) returns (SendPresenceResponse);

  // 在指定会话内推送 typing / paused 等输入状态。
  // 对应 whatsmeow Client.SendChatPresence。
  rpc SendChatPresence(SendChatPresenceRequest) returns (SendChatPresenceResponse);

  // 订阅指定 JID 的在线状态推送（对方上线 / 下线 / 最近一次活跃时间）。
  // 对应 whatsmeow Client.SubscribePresence。
  rpc SubscribePresence(SubscribePresenceRequest) returns (SubscribePresenceResponse);

  // ───────────────────────────────────────────────────────────────────────────
  // Reactions / Edits / Revokes (Phase 5)
  // ───────────────────────────────────────────────────────────────────────────
  //
  // 三个元操作 RPC 都不接 idempotency 缓存（首版 Deduped 始终为 false）：
  // whatsmeow 内部以 target_message_id 作为 stanza key，重发由 WhatsApp 自行去重。
  //
  // 错误映射：
  //   - chat_jid / target_message_id 空，或 JID 非法 → INVALID_ARGUMENT
  //   - account_key 未注册 → NOT_FOUND
  //   - 其它（whatsmeow 业务错误 / 网络）→ INTERNAL，error_message 透传原始文本

  // 对一条消息发送 reaction（emoji 为空字符串表示取消反应）。
  // target_sender_jid 在 DM 中可空（whatsmeow 自行从 chat_jid 推断），
  // 群聊里加给他人消息时必须传被反应消息的发送者 JID。
  rpc SendReaction(SendReactionRequest) returns (SendReactionResponse);

  // 编辑一条已发送消息的文本。whatsmeow EditWindow=20min，超时由 WhatsApp 拒绝。
  rpc SendEdit(SendEditRequest) returns (SendEditResponse);

  // 撤回一条消息。target_sender_jid 在群聊管理员撤回他人消息时必须传被撤回者 JID；
  // 自己撤回自己消息可空（whatsmeow 内部用 EmptyJID 标记 FromMe=true）。
  rpc SendRevoke(SendRevokeRequest) returns (SendRevokeResponse);

  // ───────────────────────────────────────────────────────────────────────────
  // Media (Phase 4.3)
  // ───────────────────────────────────────────────────────────────────────────
  //
  // 媒体走流式 RPC 以避免 gRPC 默认 4MB 单包上限。
  //   - SendMedia：客户端流式。第 1 帧必须是 SendMediaInit（携带元数据 +
  //     幂等键 client_msg_id），后续帧均为 chunk bytes。sidecar 边收边
  //     缓冲到内存（Phase 4.3 上限 100MB / whatsmeow 限制），收齐后调用
  //     whatsmeow Upload + SendMessage(Image/Video/Audio/Document/Sticker)。
  //     幂等性：(account_key, client_msg_id) 在去重窗口内已确认则返回缓存
  //     SendMediaResponse 且 deduped=true，不重复上传。
  //   - DownloadMedia：服务端流式。Python 拿 MediaInfo（来自之前接收的
  //     MediaMessageEvent）发出请求，sidecar 调 whatsmeow Download 后
  //     按固定 chunk 大小流式回传 bytes。
  //
  // 错误映射（与现有 RPC 相同基调）：
  //   - JID 非法 / kind UNSPECIFIED → INVALID_ARGUMENT
  //   - 账号未连接 → FAILED_PRECONDITION
  //   - 媒体超限 / 文件大小不匹配 → RESOURCE_EXHAUSTED
  //   - whatsmeow Upload/Download 失败 → UNAVAILABLE 并附带原始错误文本
  //   - 媒体已过期 / key 失效 → NOT_FOUND

  // 上传媒体并发送媒体消息。client streaming：第 1 帧 SendMediaInit
  // 携带元数据，后续帧为 chunk bytes。sidecar 在收完所有 chunk 后
  // 一次性回 SendMediaResponse。
  rpc SendMedia(stream SendMediaRequest) returns (SendMediaResponse);

  // 下载之前接收到的媒体并以流式 chunk 回传给 Python。
  rpc DownloadMedia(DownloadMediaRequest) returns (stream DownloadMediaChunk);

  // 请求优雅停机。sidecar 将：
  //   1. 停止接受新的 RPC。
  //   2. 干净地断开所有客户端连接。
  //   3. 刷新事件流。
  //   4. 以代码 0 退出。
  rpc Shutdown(ShutdownRequest) returns (ShutdownResponse);
}

// ─────────────────────────────────────────────────────────────────────────────
// Health (健康检查)
// ─────────────────────────────────────────────────────────────────────────────

message PingRequest {
  // Python supervisor 的协议版本。Sidecar 会拒绝版本不匹配的请求。
  uint32 client_protocol_version = 1;
}

message PingResponse {
  uint32 server_protocol_version = 1;
  string sidecar_version = 2;       // 人类可读版本，例如 "0.1.0"
  string whatsmeow_version = 3;     // 构建时固定的上游库版本
  string sidecar_id = 4;            // 单机模式下为 "default"
}

// ─────────────────────────────────────────────────────────────────────────────
// Account state (shared) (账号状态 - 共享)
// ─────────────────────────────────────────────────────────────────────────────

// sidecar 内部单个账号的连接生命周期。从每个账号管理 RPC 返回，
// 以便调用者始终获得权威的调用后状态。
message AccountState {
  enum State {
    STATE_UNSPECIFIED = 0;
    STATE_UNPAIRED = 1;       // 无设备凭据，需要 QR
    STATE_PAIRING = 2;        // QR 已生成，等待扫描
    STATE_CONNECTING = 3;     // WebSocket 开启中
    STATE_CONNECTED = 4;      // 在线并接收中
    STATE_DISCONNECTED = 5;   // 有意离线，保留凭据
    STATE_LOGGED_OUT = 6;     // 凭据已清除
    STATE_RECOVERING = 7;     // Sidecar 重启，正在重新建立连接
  }

  string account_key = 1;
  string jid = 2;            // 如果尚未配对则为空
  State state = 3;

  // 当前状态的原因，对于 STATE_DISCONNECTED 特别有用。
  // 自由格式，仅用于调试。不是用于解析的稳定合约的一部分。
  string reason = 4;
}

// ─────────────────────────────────────────────────────────────────────────────
// Account RPCs (账号 RPC)
// ─────────────────────────────────────────────────────────────────────────────

message EnsureAccountRequest {
  // Python 定义的稳定标识符（例如 "sales", "bot-017"）。
  // Python 端的主键。与 whatsmeow Device 行 1:1 映射。
  string account_key = 1;

  // 可选的人类可读名称。由 Python 持久化到 manifest.json 中。
  string display_name = 2;

  // 可选。此 账号 / account_key 之前配对到的 WhatsApp JID，
  // 来源于 Python supervisor 的 manifest.json（这是 账号 / account_key -> JID 映射的唯一事实来源；
  // sidecar 刻意不维护此映射）。
  //
  //   - 为空：sidecar 分配一个新的、未配对的设备。
  //     调用者必须接着调用 Connect 以驱动 QR 配对。
  //   - 不为空：sidecar 为此 JID 加载持久化的设备。
  //     如果缺少设备行，则调用失败并返回 FAILED_PRECONDITION
  //     （manifest/数据库漂移需要显式恢复，而不是静默重新配对）。
  string jid = 3;
}

message EnsureAccountResponse {
  AccountState state = 1;
  bool created = 2;          // 如果刚刚插入了新的 Device 行，则为 true
}

message ConnectRequest {
  string account_key = 1;
}

message ConnectResponse {
  AccountState state = 1;
}

message DisconnectRequest {
  string account_key = 1;
}

message DisconnectResponse {
  AccountState state = 1;
}

message LogoutRequest {
  string account_key = 1;
}

message LogoutResponse {
  AccountState state = 1;
}

// ─────────────────────────────────────────────────────────────────────────────
// Sending (发送)
// ─────────────────────────────────────────────────────────────────────────────

message SendMessageRequest {
  string account_key = 1;
  string to_jid = 2;

  // 幂等键。必填。由 Python 生成（例如 UUID 或确定性哈希）。
  // Sidecar 在内存窗口内对 (account_key, client_msg_id) 进行去重
  // （Phase 1：5 分钟，10k 条目 LRU）。
  string client_msg_id = 3;

  // Phase 1：仅文本。未来的媒体主体将使用编号 11..19。
  TextBody text = 10;

  // 为未来的媒体类型保留编号，以免破坏协议。
  reserved 11 to 19;
  reserved "image", "audio", "video", "document", "reaction", "edit", "revoke";
}

message TextBody {
  string body = 1;

  // 可选的回复目标。引用的 message_id 必须是我们之前观察到的
  // （发送或接收的）属于同一账号的消息。
  string reply_to_message_id = 2;
}

message SendMessageResponse {
  // 服务端分配的 WhatsApp 消息 id。在去重窗口内的重试中保持稳定。
  string message_id = 1;

  // 来自 WhatsApp 的服务端时间戳。
  google.protobuf.Timestamp server_timestamp = 2;

  // 如果此响应是从去重缓存中提供的（即之前看到过相同的 client_msg_id
  // 且我们没有重新发送），则为 true。
  bool deduped = 3;
}

// ─────────────────────────────────────────────────────────────────────────────
// Event stream (事件流)
// ─────────────────────────────────────────────────────────────────────────────

message StreamEventsRequest {
  // 如果为 true，则包含高频低价值事件（在线状态、除绑定到外发发送之外的回执、
  // 同步噪点）。默认为 false。Phase 1 即使设为 true 也不会实现这些；
  // 该标志的存在是为了前向兼容。
  bool include_soft_events = 1;

  // 可选的恢复游标。Phase 1 会忽略此项（sidecar 没有事件持久化；
  // 重连时 Python 通过 Connect 重新同步状态）。
  uint64 resume_after_seq = 2;
}

// 承载路由元数据 + 事件负载的包装器。seq 在整个 sidecar 生命周期内
// 是单调递增的（在 sidecar 重启时重置）。
message StreamEventsResponse {
  uint64 seq = 1;
  string sidecar_id = 2;       // 单机模式下为 "default"
  string account_key = 3;
  string account_jid = 4;       // 如果账号尚未配对则为空
  google.protobuf.Timestamp observed_at = 5;

  oneof event {
    ConnectedEvent connected = 10;
    DisconnectedEvent disconnected = 11;
    QREvent qr = 12;
    PairSuccessEvent pair_success = 13;
    MessageEvent message = 14;
    LoggedOutEvent logged_out = 15;
    JoinedGroupEvent joined_group = 16;
    GroupInfoEvent group_info = 17;
    GroupParticipantUpdateEvent group_participant_update = 18;
    // Phase 4.2 软状态事件。仅在 StreamEventsRequest.include_soft_events=true
    // 时才会被 sidecar 翻译并下发；否则在 events.bus 处直接丢弃，零开销。
    ReceiptEvent receipt = 19;
    PresenceEvent presence = 20;
    ChatPresenceEvent chat_presence = 21;
    // Phase 4.3 入站媒体消息事件。Python dispatcher 会把此事件折叠回
    // 公开层 MessageEvent(media=...) 以保持 router.message 路由统一。
    MediaMessageEvent media_message = 22;
    UnknownEvent unknown = 99;

    // Phase 5 元操作事件（reactions / edits / revokes / delete-for-me）。
    // 这四类不折叠回 MessageEvent，由 router 提供独立装饰器路由。
    ReactionEvent reaction = 100;
    MessageEditEvent message_edit = 101;
    MessageRevokeEvent message_revoke = 102;
    MessageDeleteForMeEvent message_delete_for_me = 103;
  }

  // 为未来的事件变体保留。
  reserved 23 to 98;
  // 为未来的元操作事件保留（polls / starred / pinned / forward 等）。
  reserved 104 to 199;
}

message ConnectedEvent {}

message DisconnectedEvent {
  string reason = 1;            // 自由格式调试字符串
}

// 在配对过程中发出。相同的 QR 字符串会在轮换时重新发出
// （whatsmeow 大约每 20 秒轮换一次）。Python 应该渲染最新的一个。
message QREvent {
  string code = 1;              // 原始 QR 负载，通过 qrcode 库渲染
  uint32 ttl_seconds = 2;       // 此代码的剩余有效期
}

message PairSuccessEvent {
  string jid = 1;
  string business_name = 2;
  string platform = 3;          // "android", "ios" 等。
}

message LoggedOutEvent {
  string reason = 1;            // 例如 "phone_unlinked", "banned"
}

message MessageEvent {
  string message_id = 1;
  string chat_jid = 2;
  string sender_jid = 3;
  bool from_me = 4;
  google.protobuf.Timestamp timestamp = 5;
  bool is_group = 6;

  // Phase 1：仅文本。未来的媒体变体将作为附加字段添加
  // （oneof 会破坏与 Phase 1 消息的 wire 兼容性）。
  string text = 10;

  // 回复上下文：此消息所回复的 message_id。如果不是回复则为空。
  string reply_to_message_id = 11;

  // 为未来的媒体负载保留。
  reserved 12 to 29;
  reserved "image", "audio", "video", "document", "sticker";
}

// 适配器尚未翻译的 whatsmeow 事件的兜底。
// 携带用于调试的 Go 类型名称。Python 将这些显示为 UnknownEvent
// （默认不传递给用户处理程序）。
message UnknownEvent {
  string go_type = 1;
}

// ─────────────────────────────────────────────────────────────────────────────
// Group events (Phase 4.1)
// ─────────────────────────────────────────────────────────────────────────────
//
// 这三类事件覆盖账号视角能感知的所有群组变更：
//   - JoinedGroupEvent       账号自身加入了某个群（主动 / 被拉 / 创建）。
//   - GroupInfoEvent         已加入群的元数据发生变化（改名、改头像、设置变更等）。
//   - GroupParticipantUpdateEvent  群成员的 add / remove / promote / demote。
//
// 注意：账号"离开"群没有对应专用事件；whatsmeow 在这种情况下仅停止推送
// 该群的事件流。Python 端可通过 ListJoinedGroups 周期性核对，或观察
// GroupParticipantUpdateEvent 中本账号 JID 是否被 REMOVE。

// 账号加入了某个群。group_info 字段携带加入瞬间的完整群信息快照。
message JoinedGroupEvent {
  GroupInfo group_info = 1;

  // 加入原因。whatsmeow 透传字符串，未来可能新增取值。
  // 已知值：
  //   "invite_link"     通过邀请链接加入
  //   "added_by_admin"  被管理员拉进群
  //   "created"         自己创建的群
  //   ""                whatsmeow 未提供具体原因
  // 客户端应宽容处理未知字符串。
  string join_reason = 2;
}

// 已加入群的元数据更新。完整新元数据放在 group_info 中，
// 客户端应替换本地缓存而非 diff 合并。
message GroupInfoEvent {
  GroupInfo group_info = 1;
}

// 群成员变更。每次事件覆盖一个动作 + 一组目标 JID。
// 例如管理员一次提升 3 个成员为管理员，会产生一次 action=PROMOTE，
// participant_jids 携带 3 个 JID。
message GroupParticipantUpdateEvent {
  enum GroupParticipantAction {
    GROUP_PARTICIPANT_ACTION_UNSPECIFIED = 0;
    GROUP_PARTICIPANT_ACTION_ADD = 1;       // 添加新成员到群
    GROUP_PARTICIPANT_ACTION_REMOVE = 2;    // 从群中移除成员
    GROUP_PARTICIPANT_ACTION_PROMOTE = 3;   // 提升为管理员
    GROUP_PARTICIPANT_ACTION_DEMOTE = 4;    // 降级为普通成员
  }

  string group_jid = 1;
  GroupParticipantAction action = 2;

  // 受影响的成员 JID 列表。至少 1 个。
  repeated string participant_jids = 3;

  // 触发此次变更的操作者 JID（管理员 / 自己 / 系统）。
  // 可能为空，例如系统级变更或 whatsmeow 未提供来源。
  string actor_jid = 4;
}

// ─────────────────────────────────────────────────────────────────────────────
// Group shared messages (Phase 4.1)
// ─────────────────────────────────────────────────────────────────────────────

// 群组完整元数据。list / get / events 共用此 schema。
// 字段全集对应 whatsmeow types.GroupInfo 主要字段。
// 后续 Phase 可向此 message 追加新字段（wire 兼容），但禁止删除现有字段。
message GroupInfo {
  // 群 JID，形如 "<creation-ts>-<random>@g.us"。
  string jid = 1;

  // 群名（subject）。可能为空。
  string name = 2;

  // 群主题（description）。可能为空。
  string topic = 3;

  // 创建者 JID。可能为空（whatsmeow 在某些边缘情况下不返回）。
  string owner_jid = 4;

  // 创建时间。
  google.protobuf.Timestamp creation_timestamp = 5;

  // 当前所有成员（包括自己）。顺序未定义，调用方按需排序。
  repeated GroupParticipant participants = 6;

  // announce 模式：仅管理员可发消息。
  bool is_announce = 7;

  // locked 模式：仅管理员可修改群信息。
  bool is_locked = 8;

  // 阅后即焚开关。
  bool is_ephemeral = 9;

  // 阅后即焚消息有效期，单位秒。仅当 is_ephemeral=true 时有意义。
  uint32 ephemeral_duration_seconds = 10;

  // 加入审批模式。whatsmeow 透传字符串，未来可能新增取值。
  // 已知值：
  //   "admin_add"          仅管理员可拉人入群
  //   "request_required"   非管理员申请入群需审批
  //   ""                   whatsmeow 未提供（无审批要求或字段缺失）
  // 客户端应宽容处理未知字符串。
  string membership_approval_mode = 11;
}

message GroupParticipant {
  string jid = 1;
  bool is_admin = 2;
  bool is_super_admin = 3;
}

// ─────────────────────────────────────────────────────────────────────────────
// Lifecycle (生命周期)
// ─────────────────────────────────────────────────────────────────────────────

message ShutdownRequest {
  // 以毫秒为单位的优雅期。在此时间过后，即使断开连接尚未全部完成，
  // sidecar 也会退出。
  uint32 grace_ms = 1;
}

message ShutdownResponse {}

// ─────────────────────────────────────────────────────────────────────────────
// Group RPC messages (Phase 4.1)
// ─────────────────────────────────────────────────────────────────────────────

message ListJoinedGroupsRequest {
  string account_key = 1;
}

message ListJoinedGroupsResponse {
  repeated GroupInfo groups = 1;
}

message GetGroupInfoRequest {
  string account_key = 1;
  string group_jid = 2;
}

message GetGroupInfoResponse {
  GroupInfo group_info = 1;
}

message PreviewGroupInviteRequest {
  string account_key = 1;
  // 完整邀请链接 "https://chat.whatsapp.com/<code>" 或纯 code。
  string invite_link = 2;
}

message PreviewGroupInviteResponse {
  GroupInfo group_info = 1;
}

message JoinGroupViaInviteRequest {
  string account_key = 1;
  // 完整邀请链接 "https://chat.whatsapp.com/<code>" 或纯 code。
  string invite_link = 2;
}

message JoinGroupViaInviteResponse {
  // 加入后的群 JID。完整群信息会通过事件流以 JoinedGroupEvent 推送。
  string group_jid = 1;
}

message LeaveGroupRequest {
  string account_key = 1;
  string group_jid = 2;
}

message LeaveGroupResponse {}

message CreateGroupRequest {
  string account_key = 1;
  // 群名（subject）。必填。
  string name = 2;
  // 初始参与者 JID 列表。至少 1 个（不含创建者本身）。
  repeated string participant_jids = 3;
}

message CreateGroupResponse {
  GroupInfo group_info = 1;
}

message UpdateGroupSettingsRequest {
  string account_key = 1;
  string group_jid = 2;

  // 仅在请求中显式设置的字段才会被修改；缺省字段保持不变。
  // 使用 google.protobuf.StringValue 等 wrapper 太重，这里用配套 has_* 布尔。
  string name = 3;
  bool has_name = 4;

  string topic = 5;
  bool has_topic = 6;

  bool is_announce = 7;
  bool has_is_announce = 8;

  bool is_locked = 9;
  bool has_is_locked = 10;
}

message UpdateGroupSettingsResponse {
  // 修改后的完整群信息。
  GroupInfo group_info = 1;
}

message UpdateGroupParticipantsRequest {
  string account_key = 1;
  string group_jid = 2;
  GroupParticipantUpdateEvent.GroupParticipantAction action = 3;
  // 目标成员 JID。至少 1 个。
  repeated string participant_jids = 4;
}

message UpdateGroupParticipantsResponse {
  // whatsmeow 对每个 JID 单独返回结果。
  repeated GroupParticipantUpdateResult results = 1;
}

// 单个目标成员的更新结果。
// success=false 时 error_code / error_message 描述失败原因
// （例如 "403" 表示该成员屏蔽了添加请求）。
message GroupParticipantUpdateResult {
  string jid = 1;
  bool success = 2;
  string error_code = 3;
  string error_message = 4;
}

message GetGroupInviteLinkRequest {
  string account_key = 1;
  string group_jid = 2;
  // 是否失效旧链接并生成新链接。
  bool reset = 3;
}

message GetGroupInviteLinkResponse {
  // 完整链接 "https://chat.whatsapp.com/<code>"。
  string invite_link = 1;
}

// ─────────────────────────────────────────────────────────────────────────────
// Receipts & Presence (Phase 4.2)
// ─────────────────────────────────────────────────────────────────────────────

// 回执类型。语义对齐 whatsmeow types.ReceiptType（自由格式字符串），
// 但在 wire 上收敛成枚举以避免上游变更静默破坏 Python 侧 F filter。
// 未知 / 未来类型由 sidecar 映射为 SERVER 兜底，user code 可继续按
// receipt_type == READ / DELIVERED / PLAYED 编写过滤器。
enum ReceiptType {
  RECEIPT_TYPE_UNSPECIFIED = 0;
  // whatsmeow 中空字符串语义（""）— 服务端 ack；最常见。
  RECEIPT_TYPE_DELIVERED = 1;
  // "read"
  RECEIPT_TYPE_READ = 2;
  // "played"（语音 / 视频已播放）
  RECEIPT_TYPE_PLAYED = 3;
  // "server-error" / "inactive" / "retry" 等其它兜底。
  RECEIPT_TYPE_SERVER = 4;
}

// 全局在线状态。对应 whatsmeow types.Presence ("available" / "unavailable")。
enum PresenceType {
  PRESENCE_TYPE_UNSPECIFIED = 0;
  PRESENCE_TYPE_AVAILABLE = 1;
  PRESENCE_TYPE_UNAVAILABLE = 2;
}

// 会话级输入状态。对应 whatsmeow types.ChatPresence
// ("composing" / "paused")。
enum ChatPresenceState {
  CHAT_PRESENCE_STATE_UNSPECIFIED = 0;
  // 正在输入 / 录音；whatsmeow 称 "composing"，
  // 我们沿用上游字符串作为 enum value（Python StrEnum 使用）。
  CHAT_PRESENCE_STATE_COMPOSING = 1;
  CHAT_PRESENCE_STATE_PAUSED = 2;
}

// 会话级输入状态的媒体维度。对应 whatsmeow types.ChatPresenceMedia
// ("" / "audio")。
enum ChatPresenceMedia {
  CHAT_PRESENCE_MEDIA_UNSPECIFIED = 0;
  CHAT_PRESENCE_MEDIA_TEXT = 1;
  CHAT_PRESENCE_MEDIA_AUDIO = 2;
}

message MarkReadRequest {
  string account_key = 1;
  // 至少一个；whatsmeow MarkRead 是批量 API。
  repeated string message_ids = 2;
  // 必填；DM 中即对方 JID，群聊中即群 JID。
  string chat_jid = 3;
  // 必填；DM 中等于 chat_jid，群聊中是真正发送者 JID。
  string sender_jid = 4;
  // 可选；空则 sidecar 取 time.Now()。
  google.protobuf.Timestamp read_at = 5;
  // 默认 READ；UNSPECIFIED 等同 READ。
  ReceiptType receipt_type = 6;
}
message MarkReadResponse {}

message SendPresenceRequest {
  string account_key = 1;
  PresenceType presence = 2;
}
message SendPresenceResponse {}

message SendChatPresenceRequest {
  string account_key = 1;
  string chat_jid = 2;
  ChatPresenceState state = 3;
  ChatPresenceMedia media = 4;
}
message SendChatPresenceResponse {}

message SubscribePresenceRequest {
  string account_key = 1;
  string jid = 2;
}
message SubscribePresenceResponse {}

// 入站回执。whatsmeow events.Receipt 一次可能携带多个 message_ids
// （服务端批量回执），我们按原样保留 repeated 语义，避免 N 倍事件爆炸。
// user code 用 F filter `F.has_message_id(...)` 或直接检查
// `sent_id in event.message_ids` 进行关联。
message ReceiptEvent {
  repeated string message_ids = 1;
  // 会话 JID（DM 即对方，群聊即群）。
  string chat_jid = 2;
  // 真正发送回执的对端 JID。DM 中等于 chat_jid。
  string sender_jid = 3;
  google.protobuf.Timestamp timestamp = 4;
  ReceiptType receipt_type = 5;
}

// 入站全局在线状态变更。订阅后才会收到。
message PresenceEvent {
  string from_jid = 1;
  // true 表示对端已下线；false 表示在线。
  bool unavailable = 2;
  // 上游有时携带 "最后一次活跃时间"；不存在时为 0。
  google.protobuf.Timestamp last_seen = 3;
}

// 入站会话级输入状态变更。即使没有显式 Subscribe，
// 在共享会话内也会被动接收。
message ChatPresenceEvent {
  // whatsmeow events.ChatPresence.MessageSource.Chat
  string chat_jid = 1;
  // whatsmeow events.ChatPresence.MessageSource.Sender
  string sender_jid = 2;
  ChatPresenceState state = 3;
  ChatPresenceMedia media = 4;
}

// ─────────────────────────────────────────────────────────────────────────────
// Media (Phase 4.3 stubs)
// ─────────────────────────────────────────────────────────────────────────────
//
// 设计说明：
//   - 媒体走流式 RPC（client streaming for upload, server streaming for
//     download），每个 chunk 默认 256 KiB，规避 gRPC 默认 4MB 单包上限。
//   - MediaInfo 同时承担两个角色：（a）入站事件中描述对方发来的媒体；
//     （b）DownloadMediaRequest 中带回原 message 的 directPath / mediaKey /
//     fileSha256 / fileEncSha256，让 sidecar 直接调 whatsmeow Download。
//   - 接收侧 Wire 用 MediaMessageEvent（独立 oneof tag 22）；Python
//     dispatcher 会折叠成 public MessageEvent(media=...)，user code 路由
//     仍走 router.message。
//   - 发送侧 Wire 用 SendMedia 单 RPC，kind 区分 image/video/audio/document/
//     sticker；一个 RPC 而非 5 个独立 RPC，sidecar handler 内部分支即可。
//   - 缩略图（thumbnail_jpeg）发送侧选填，让 user code 提前算好或留空让
//     sidecar 在确实需要时再生成（避免在内存里 decode 大图）。

// 媒体大类。区分 5 种 whatsmeow E2E 消息类型：ImageMessage / VideoMessage /
// AudioMessage / DocumentMessage / StickerMessage。
enum MediaKind {
  MEDIA_KIND_UNSPECIFIED = 0;
  MEDIA_KIND_IMAGE = 1;
  MEDIA_KIND_VIDEO = 2;
  MEDIA_KIND_AUDIO = 3;
  MEDIA_KIND_DOCUMENT = 4;
  MEDIA_KIND_STICKER = 5;
}

// 媒体元数据。直接对应 whatsmeow waE2E.{Image|Video|Audio|Document|Sticker}Message
// 的公共字段。所有大小数值均为字节，时长为秒。
//
// 入站时 sidecar 从 *Message 上抽取这些字段填入；下载时 Python 把这条
// MediaInfo 原样回传给 sidecar 作为 DownloadMediaRequest.media。
message MediaInfo {
  MediaKind kind = 1;
  string mime_type = 2;
  // 文件名。仅 document 常见；其它类型多为空。
  string file_name = 3;
  // 服务端声明的文件长度（whatsmeow FileLength）。
  uint64 file_length = 4;
  // 媒体附带文字说明。Document 一般无 caption。
  string caption = 5;
  // ↓↓↓ 下载凭据。Python 不消费，仅原样回传给 sidecar 做 Download。
  // 对应 whatsmeow Message 的 DirectPath / MediaKey / FileSHA256 / FileEncSHA256。
  string direct_path = 6;
  bytes media_key = 7;
  bytes file_sha256 = 8;
  bytes file_enc_sha256 = 9;
  // 缩略图字节（JPEG）。可能为空。
  bytes thumbnail_jpeg = 10;
  // 视觉媒体维度（image / video / sticker）。
  uint32 width = 11;
  uint32 height = 12;
  // 时长（video / audio）。秒。
  uint32 duration_seconds = 13;
  // 是否为语音条（仅 audio）。
  bool voice_note = 14;
  // 是否为动画（仅 sticker）。
  bool animated = 15;
  // 备用 URL，非 directPath。极少使用。
  string url = 16;
}

// 入站媒体消息事件。dispatcher 把此事件折叠到公开层 MessageEvent(media=...)
// 上以保持 router.message 路由路径不变（详见 plan §3.6）。
message MediaMessageEvent {
  string message_id = 1;
  string chat_jid = 2;
  string sender_jid = 3;
  bool from_me = 4;
  google.protobuf.Timestamp timestamp = 5;
  bool is_group = 6;
  // 回复上下文：被引用消息的 message_id。非回复时为空。
  string reply_to_message_id = 7;
  // 复制自 media.caption 以便 F.text 等过滤器免去往 media 里钻。
  string caption = 8;
  MediaInfo media = 9;
}

// SendMedia client-streaming 第一帧。仅元数据，不携带 bytes。
message SendMediaInit {
  string account_key = 1;
  string to_jid = 2;
  // 幂等键。必填。Sidecar 对 (account_key, client_msg_id) 做去重。
  string client_msg_id = 3;
  // 引用回复目标。非回复时为空。
  string quoted_message_id = 4;
  MediaKind kind = 5;
  // MIME。client 应填好；sidecar 不做内容嗅探。
  string mime_type = 6;
  // 文件名。仅 document 必填；其它类型可空。
  string file_name = 7;
  // 文字说明。document 忽略。
  string caption = 8;
  // 缩略图字节（JPEG）。可空，由 sidecar 决定是否要 best-effort 生成。
  bytes thumbnail_jpeg = 9;
  // audio 专用：是否标记为语音条。
  bool voice_note = 10;
  // 客户端声明的文件总长度。仅用于校验 sidecar 收齐 chunk 后的实际字节数；
  // 不一致返回 INVALID_ARGUMENT。
  uint64 declared_file_length = 11;
}

// SendMedia client-streaming 帧。
message SendMediaRequest {
  oneof frame {
    // 必须是流的第 1 帧。后续帧再发 init 视为协议违规。
    SendMediaInit init = 1;
    // 媒体字节分片。建议 256 KiB；超大 chunk 由 sidecar 直接拒收。
    // 总和必须等于 init.declared_file_length。
    bytes chunk = 2;
  }
}

// SendMedia 唯一回包。在所有 chunk 收齐 + whatsmeow Upload + SendMessage
// 全部完成后返回。
message SendMediaResponse {
  string message_id = 1;
  google.protobuf.Timestamp server_timestamp = 2;
  // 命中幂等缓存。
  bool deduped = 3;
}

message DownloadMediaRequest {
  string account_key = 1;
  // 复用入站 MediaInfo（带 directPath/mediaKey/sha256/encSha256）。
  MediaInfo media = 2;
}

// DownloadMedia server-streaming 帧。chunk 顺序即字节顺序；
// 客户端按收到顺序拼接即可。流自然结束（end-of-stream）表示下载完毕。
message DownloadMediaChunk {
  bytes chunk = 1;
}

// ─────────────────────────────────────────────────────────────────────────────
// Reactions / Edits / Revokes (Phase 5)
// ─────────────────────────────────────────────────────────────────────────────
//
// 三个出站元操作 + 四个入站元操作事件。所有响应 message 与 SendMessageResponse
// 的字段形状对齐（message_id / google.protobuf.Timestamp server_timestamp /
// deduped），便于 Python SendResult.from_proto 直接复用。

message SendReactionRequest {
  string account_key = 1;
  // 必填。会话 JID（DM 中是对端 JID，群聊中是群 JID）。
  string chat_jid = 2;
  // 必填。被反应消息的 message_id。
  string target_message_id = 3;
  // 群聊中给他人消息加 reaction 时必填，DM / 自己消息可空。
  string target_sender_jid = 4;
  // 反应表情。空字符串等同于取消反应（whatsmeow RemoveReactionText）。
  string emoji = 5;
}

message SendReactionResponse {
  string message_id = 1;
  google.protobuf.Timestamp server_timestamp = 2;
  bool deduped = 3;
}

message SendEditRequest {
  string account_key = 1;
  // 必填。会话 JID。
  string chat_jid = 2;
  // 必填。被编辑消息的 message_id。
  string target_message_id = 3;
  // 必填。新文本（不允许空字符串；如果想"清空"消息，请走 SendRevoke）。
  string new_text = 4;
}

message SendEditResponse {
  string message_id = 1;
  google.protobuf.Timestamp server_timestamp = 2;
  bool deduped = 3;
}

message SendRevokeRequest {
  string account_key = 1;
  // 必填。会话 JID。
  string chat_jid = 2;
  // 必填。被撤回消息的 message_id。
  string target_message_id = 3;
  // 群聊管理员撤回他人消息时必填，自己撤回自己消息可空。
  string target_sender_jid = 4;
}

message SendRevokeResponse {
  string message_id = 1;
  google.protobuf.Timestamp server_timestamp = 2;
  bool deduped = 3;
}

// 入站 reaction 事件。emoji 为空字符串表示对方取消了 reaction。
// grouping_key / sender_timestamp_ms 透传 whatsmeow ReactionMessage 字段，
// 用于客户端做 reaction 状态聚合（同一发送者多次切换 emoji 时去重）。
message ReactionEvent {
  string chat_jid = 1;
  string sender_jid = 2;
  string target_message_id = 3;
  string emoji = 4;
  int64 timestamp_ms = 5;
  string grouping_key = 6;
  int64 sender_timestamp_ms = 7;
}

// 入站消息编辑事件。target_message_id 是被编辑消息的原始 ID
// （whatsmeow 在 IsEdit=true 时已经 unwrap protocolMessage.editedMessage 到
// events.Message 顶层，原始 ID 写入 Info.ID）。
message MessageEditEvent {
  string chat_jid = 1;
  string sender_jid = 2;
  string target_message_id = 3;
  string new_text = 4;
  int64 timestamp_ms = 5;
}

// 入站消息撤回事件。is_admin_revoke=true 表示群管理员撤回他人消息
// （whatsmeow events.Message.Info.Edit == EditAttributeAdminRevoke "8"）。
message MessageRevokeEvent {
  string chat_jid = 1;
  string sender_jid = 2;
  string target_message_id = 3;
  bool is_admin_revoke = 4;
  int64 timestamp_ms = 5;
}

// 入站 "delete-for-me" 事件。WhatsApp 端从用户自己设备删除某条消息时触发；
// 不同于 revoke，这条消息仍然存在于其它设备。is_from_me 表示被删消息原本是
// 自己发的；from_full_sync 表示这是新设备首次全量同步带回的历史删除事件。
message MessageDeleteForMeEvent {
  string chat_jid = 1;
  string target_message_id = 2;
  int64 timestamp_ms = 3;
  bool is_from_me = 4;
  bool from_full_sync = 5;
}
